<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="page-with-nav">
    <nav>
      <button class="selector"><a href="index.html">Home</a></button>
      <button class="selector">
        <a href="tic-tac-toe.html">Tic-Tac-Toe</a>
      </button>
      <button class="selector">
        <a href="random-fact-gen.html">Generate a random fun fact</a>
      </button>
      <button class="selector">
        <a href="#">Guess the number</a>
      </button>
    </nav>
    <div id="gameContainer">
      <h1>Guess the Number</h1>
      <h2 id="statusText">I'm thinking of a number between 1 and 100...</h2>
      <div id="inputRow">
        <input
          type="number"
          id="guessInput"
          min="1"
          max="100"
          placeholder="???"
        />
        <button id="guessBtn">Guess</button>
      </div>
      <p id="hint"></p>
      <button id="restartBtn">Restart</button>
    </div>

    <script src="guess.js"></script>
  </body>
</html>
