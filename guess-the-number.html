    <div id="gameContainer">
      <h1>Guess the Number</h1>
      <h2 id="statusText">I'm thinking of a number between 1 and 100...</h2>
      <div id="inputRow">
        <input
          type="number"
          id="guessInput"
          min="1"
          max="100"
          placeholder="???"
        />
        <button id="guessBtn">Guess</button>
      </div>

      <button id="restartBtn">Restart</button>
